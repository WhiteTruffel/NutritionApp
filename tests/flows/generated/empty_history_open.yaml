# GENERATED by DeepSeek via OpenRouter, review before trusting.
# Regression: Leere Koffein-Historie oeffnen -> kein Crash (Issue #5 Boundary-Fall).
appId: com.tobiaskoch.NutritionApp
---
- launchApp:
    stopApp: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Trinken"
    timeout: 30000
# Tab-Wechsel IMMER per Punkt-Tap: launchApp resumed auf dem letzten Tab,
# und Text-Taps koennen unsichtbare Hierarchie-Elemente treffen (No-Op).
- tapOn:
    point: "198,822"
- waitForAnimationToEnd
- waitForAnimationToEnd
# Beweis fuer aktiven Trinken-Tab: echtes Scrollen zum obersten Wasser-Button
# (IDs inaktiver Tabs stehen in der Hierarchie, nur Scroll/Sicht beweist den Screen).
- scrollUntilVisible:
    element:
      id: "fluids.water.add250"
    direction: UP
- scrollUntilVisible:
    element:
      id: "fluids.entry.delete"
    direction: DOWN
    timeout: 10000
    optional: true
- repeat:
    times: 8
    while:
      visible:
        id: "fluids.entry.delete"
    commands:
      - swipe:
          direction: UP
          duration: 300
      - waitForAnimationToEnd
      - tapOn:
          id: "fluids.entry.delete"
          index: 0
      - waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "fluids.caffeineHistory.open"
    direction: UP
- tapOn:
    id: "fluids.caffeineHistory.open"
- assertVisible: "Koffein im K.*rper"
