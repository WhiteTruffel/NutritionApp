# GENERATED by DeepSeek via OpenRouter, review before trusting.
# Regression: Mehrere Getraenke loggen -> Koffein-Wert aktualisiert -> Tagesliste zeigt mehrere Eintraege -> Aufraeumen.
appId: com.tobiaskoch.NutritionApp
---
- launchApp:
    stopApp: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Health Access"
    timeout: 5000
    optional: true
- repeat:
    times: 2
    while:
      visible: "Health Access"
    commands:
      - tapOn: "Turn On All"
      - waitForAnimationToEnd
      - tapOn: "Allow"
      - waitForAnimationToEnd
- tapOn:
    text: "Überspringen"
    optional: true
- extendedWaitUntil:
    visible: "Trinken"
    timeout: 30000
- tapOn:
    point: "198,822"
- waitForAnimationToEnd
# Beweis fuer aktiven Trinken-Tab: echtes Scrollen zum obersten Wasser-Button
# (IDs inaktiver Tabs stehen in der Hierarchie, nur Scroll/Sicht beweist den Screen).
- scrollUntilVisible:
    element:
      id: "fluids.water.add250"
    direction: UP
# Pre-Clean: bestehende Eintraege loeschen
- scrollUntilVisible:
    element:
      id: "fluids.entry.delete"
    direction: DOWN
    timeout: 10000
    optional: true
- repeat:
    times: 8
    while:
      visible:
        id: "fluids.entry.delete"
    commands:
      - swipe:
          direction: UP
          duration: 300
      - waitForAnimationToEnd
      - tapOn:
          id: "fluids.entry.delete"
          index: 0
      - waitForAnimationToEnd
# Zurueck nach oben zu den Quick-Add-Buttons
- scrollUntilVisible:
    element:
      id: "fluids.drink.Espresso"
    direction: UP
# Espresso loggen (63 mg Koffein + 30 ml Wasser)
- tapOn:
    id: "fluids.drink.Espresso"
- waitForAnimationToEnd
# Doppio loggen (125 mg Koffein + 60 ml Wasser)
- tapOn:
    id: "fluids.drink.Doppio"
- waitForAnimationToEnd
# Koffein-Wert verifizieren (sollte sichtbar sein, Wert > 0)
- assertVisible:
    id: "fluids.caffeine.activeValue"
# Tagesliste hinscrollen und mehrere Eintraege verifizieren
- scrollUntilVisible:
    element:
      id: "fluids.entry.caffeine"
    direction: DOWN
# Mindestens ein Koffein-Eintrag sollte vorhanden sein
- assertVisible:
    id: "fluids.entry.caffeine"
# Mindestens ein Wasser-Eintrag sollte vorhanden sein
- assertVisible:
    id: "fluids.entry.water"
# Loesch-Buttons sollten sichtbar sein (mindestens 2)
- assertVisible:
    id: "fluids.entry.delete"
# Aufraeumen: alle Eintraege loeschen (Espresso + Doppio = 4 Eintraege)
- repeat:
    times: 4
    while:
      visible:
        id: "fluids.entry.delete"
    commands:
      - swipe:
          direction: UP
          duration: 300
      - waitForAnimationToEnd
      - tapOn:
          id: "fluids.entry.delete"
          index: 0
      - waitForAnimationToEnd
# Verifizieren dass keine Eintraege mehr vorhanden sind
- assertNotVisible:
    id: "fluids.entry.caffeine"
- assertNotVisible:
    id: "fluids.entry.water"
